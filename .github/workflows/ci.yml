name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-check

      - name: Cache apt packages
        id: apt-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/apt-cache
          key: apt-${{ runner.os }}-webkit-v1

      - name: Install system dependencies
        run: |
          DEPS="libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf"
          if [ "${{ steps.apt-cache.outputs.cache-hit }}" = "true" ]; then
            sudo cp ~/apt-cache/*.deb /var/cache/apt/archives/ 2>/dev/null || true
            if ! sudo apt-get install -y --no-download $DEPS 2>/dev/null; then
              sudo apt-get update
              sudo apt-get install -y $DEPS
            fi
          else
            sudo apt-get update
            sudo apt-get install -y $DEPS
          fi
          mkdir -p ~/apt-cache
          sudo cp /var/cache/apt/archives/*.deb ~/apt-cache/ 2>/dev/null || true

      - name: Install npm dependencies
        run: pnpm install

      - name: Build MCP sidecar binary
        run: bash scripts/build-mcp-sidecar.sh

      - name: Build CLI sidecar binary
        run: bash scripts/build-cli-sidecar.sh

      - name: Rust format check
        run: cargo fmt --all -- --check

      - name: Rust clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Rust tests
        run: cargo test --all

      - name: TypeScript type check
        run: pnpm --filter @zoro/desktop type-check

  build-extension:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install
      - run: pnpm --filter @zoro/browser-extension build
